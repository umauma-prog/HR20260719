  const field=r.field.map(f=>{const rv=fl[f.u];
    const res=rv&&rv[0]?`<span class="fres ${plc(rv[0])}">${rv[0]}着${rv[1]?'('+rv[1]+'人)':''}</span>`:'';
    return `<div class="fr"><span class="fm ${MC[f.m]||''}">${f.m||'·'}</span>
    <span class="fx">${f.x?'X'+f.x:''}</span>${wkn(f.waku,f.u)}<div class="fb2">
    <div class="f1"><span class="nm ${scrN[f.u]?'scr':''}">${esc(f.nm)}</span>${scrN[f.u]?`<span class="scrtag">${scrN[f.u]}</span>`:''}<span class="sa">${esc(f.sa)}</span>${kinc(f.u,f.kin)}${jkc(f.u,f.jk)}
    <span class="pr" style="margin-left:auto">勝${f.pw}%</span>${res}</div>
    <div class="f2">前走 ${esc(f.zen)}</div>${f.tan?`<div class="tan">${esc(f.tan)}</div>`:''}</div></div>`}).join('');
  return `<div class="card" style="border-left:3px solid ${TC[r.track]||'#354c3f'}">
    <div class="ch"><span class="rno" style="color:${TC[r.track]||'var(--gold)'}">${r.R}R</span><span class="rnm">${esc(r.name)}</span>${r.result?'<span class="revbadge">回顧</span>':''}</div>
    <div class="cond"><span class="tk" style="color:${TC[r.track]||'#fff'}">${r.track}</span><span class="gb ${r.gcls}">${r.grade}</span><span>${r.surf}${r.dist}m</span><span class="pace">想定${r.pace}</span>${r.post?`<span class="post">🕐${r.post}発走</span>`:''}</div>
    ${scrl.length?`<div class="scrban">🚫 取消/除外: ${scrl.map(s=>s.num+s.type+(s.name?'('+esc(s.name)+')':'')).join('・')}</div>`:''}
    ${chgl.length?`<div class="chgban">🔄 ロック後の変更: ${chgl.map(c=>c.num+'番'+(c.jk_to?` 乗替 ${esc(c.jk_from)}→${esc(c.jk_to)}`:'')+(c.kin_to?` 斤量 ${esc(c.kin_from)}→${esc(c.kin_to)}kg`:'')).join('・')}</div>`:''}
    ${head}${x}${buy}
    ${r.result?review(r):''}
    <button class="more" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden;this.textContent=this.nextElementSibling.hidden?'＋ 出走全頭・短評':'－ 閉じる'">＋ 出走全頭・短評</button>
    <div class="det" hidden>${field}</div></div>`;
}
function render(){
  let rs=RACES.filter(r=>(F.track=='全'||r.track==F.track)&&(F.surf=='全'||r.surf==F.surf)
    &&(F.grade=='全'||(F.grade=='重賞・特別'?(r.gcls=='op'||r.gcls=='c3'||r.gcls=='c2'):true)));
  const g=$('#grid');
  if(S=='◎勝率'){rs.sort((a,b)=>(b.head[0]?b.head[0].pw:0)-(a.head[0]?a.head[0].pw:0));g.innerHTML=rs.map(card).join('')}
  else{const tk=TKS;g.innerHTML=tk.filter(t=>rs.some(r=>r.track==t)).map(t=>
    `<div class="sec" style="color:${TC[t]};border-bottom-color:${TC[t]}77">${t}${babaHtml(t)}</div>`+rs.filter(r=>r.track==t).sort((a,b)=>a.R-b.R).map(card).join('')).join('')}
}
function chips(){
  const n=RACES.length,op=RACES.filter(r=>r.gcls=='op'||r.gcls=='c3'||r.gcls=='c2').length;
  const rev=RACES.filter(r=>r.result).length;
  const tkc=TKS.map(t=>`<b style="color:${TC[t]}">${t}</b>${RACES.filter(r=>r.track==t).length}`).join('・');
  $('#chips').innerHTML=`<span class="chip">全<b>${n}</b>R</span><span class="chip">重賞・特別<b>${op}</b></span>
    <span class="chip">${tkc}</span>
    ${rev?`<span class="chip">回顧 <b style="color:var(--gold)">${rev}</b>/${n}R</span>`:''}
    <span class="chip">エンジン<b>v2+調教</b></span>`;
}
function ctrls(){
  $('#flt').innerHTML=['全',...TKS].map(v=>{const c=TC[v],on=F.track==v;
    const st=on?(c?`background:${c};color:#0b1410;border-color:${c}`:''):(c?`border-color:${c}66`:'');
    const dot=c&&!on?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:6px"></span>`:'';
    return `<button class="fb ${on?'on':''}" data-k="track" data-v="${v}" style="${st}">${dot}${v}</button>`}).join('');
  $('#srt').innerHTML=['全','芝','ダ'].map(v=>`<button class="fb ${F.surf==v?'on':''}" data-k="surf" data-v="${v}">${v=='全'?'芝/ダ':v}</button>`).join('')
    +['全','重賞・特別'].map(v=>`<button class="fb ${F.grade==v?'on':''}" data-k="grade" data-v="${v}">${v}</button>`).join('')
    +['場順','◎勝率'].map(v=>`<button class="fb ${S==v?'on':''}" data-k="_s" data-v="${v}">並:${v}</button>`).join('');
  document.querySelectorAll('.fb').forEach(b=>b.onclick=()=>{const k=b.dataset.k,v=b.dataset.v;if(k=='_s')S=v;else F[k]=v;ctrls();render()});
}
chips();ctrls();renderBaba();render();
// 現在時刻(JST)＋次のレース。post_times を各レースに埋め込み、毎秒クライアントで再計算（ビルド不要）。
function jstParts(){const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Tokyo',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());const g=t=>+p.find(x=>x.type===t).value;return{h:g('hour'),m:g('minute'),s:g('second')};}
function jstYmd(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date()).replace(/-/g,'');}
function tick(){
  const {h,m,s}=jstParts(),pad=n=>String(n).padStart(2,'0'),nowMin=h*60+m+s/60;
  let html=`<span class="clock">🕐 ${pad(h)}:${pad(m)}:${pad(s)}<small>JST</small></span>`;
  const jd=jstYmd();
  if(jd<DASH_DATE){html+=`<span class="nx soon">▶ ${+DASH_DATE.slice(4,6)}/${+DASH_DATE.slice(6,8)} 前日予想（発走前）・想定馬場</span>`;}
  else if(jd>DASH_DATE){html+=`<span class="nx done">▶ 開催終了</span>`;}
  else{let nx=null,best=1e9,run=null;
    for(const r of RACES){if(!r.post)continue;const a=r.post.split(':');const pm=(+a[0])*60+(+a[1]);
      if(pm>nowMin&&pm<best){best=pm;nx=r;} if(nowMin>=pm&&nowMin<pm+4)run=r;}
    if(run)html+=`<span class="nx" style="border-color:var(--red);color:var(--red)">🏇 発走中 <b>${run.track}${run.R}R</b></span>`;
    if(nx){const left=Math.max(0,Math.ceil(best-nowMin));
      html+=`<span class="nx ${left<=5?'soon':''}">▶ 次 <b style="color:${TC[nx.track]}">${nx.track}${nx.R}R</b> ${esc(nx.name)}・${nx.post}発走 あと${left}分</span>`;}
    else if(!run){html+=`<span class="nx done">▶ 本日の全レース発走済</span>`;}}
  $('#nowbar').innerHTML=html;
}
tick();setInterval(tick,1000);
